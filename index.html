<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juicy Service</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:white;
overflow:hidden;
}

/* 🔥 CLICK ENTER */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
cursor:pointer;
background:radial-gradient(circle at center, #1a0000, black);
}

.neon{
color:red;
text-shadow:0 0 10px red,0 0 30px red,0 0 80px red;
}

/* MAIN */
.main{
display:none;
padding:40px;
text-align:center;
}

/* HERO STYLE */
.top{
margin-bottom:60px;
}

.big{
font-size:40px;
}

/* PRODUITS */
.products{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
width:300px;
background:#0a0a0a;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 20px rgba(255,0,0,0.2);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 40px red;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
margin:15px;
}

.price{
color:#ff2a2a;
margin-bottom:15px;
}

/* FOND ROUGE LÉGER */
.bg-glow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(255,0,0,0.15), transparent 60%);
z-index:-1;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<!-- CLICK -->
<div class="hero" onclick="enter()">
<h1 class="neon">CLICK TO ENTER</h1>
<h2 class="neon">Juicy Service</h2>
</div>

<!-- SITE -->
<div class="main" id="main">

<div class="top">
<h1 class="neon big">Nos Produits</h1>
<p style="color:#aaa;">Services premium rapides et sécurisés</p>
</div>

<div class="products">

<!-- HWID -->
<div class="card">
<img src="https://images.unsplash.com/photo-1614064641938-3bbee52942c7?q=80&w=1000">
<h3>🛡 HWID Spoofer</h3>
<p class="price">29.99€</p>
</div>

<!-- RL -->
<div class="card">
<img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?q=80&w=1000">
<h3>🚀 RL Boosting</h3>
<p class="price">20€</p>
</div>

<!-- STEAM -->
<div class="card">
<img src="https://cdn.cloudflare.steamstatic.com/store/home/store_home_share.jpg">
<h3>🎮 Steam Account</h3>
<p class="price">15€</p>
</div>

</div>

</div>

<script>
function enter(){
document.querySelector(".hero").style.display="none";
document.getElementById("main").style.display="block";
document.body.style.overflow="auto";
}
</script>

</body>
</html>
