<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juicy Service</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* FOND TEXTE ANIMÉ */
.bg-text {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  overflow: hidden;
  display:none;
}

.line {
  position:absolute;
  width:200%;
  white-space:nowrap;
  font-size:40px;
  color:red;
  opacity:0.08;
  text-shadow:0 0 10px red,0 0 20px red;
  animation:scroll 25s linear infinite;
}

.line:nth-child(1){top:10%;}
.line:nth-child(2){top:30%;}
.line:nth-child(3){top:50%;}
.line:nth-child(4){top:70%;}
.line:nth-child(5){top:90%;}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* ACCUEIL */
.hero {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  cursor:pointer;
}

.neon{
  color:red;
  text-shadow:0 0 10px red,0 0 20px red;
}

/* PAGES */
.products,.productPage{
  display:none;
  padding:50px;
  text-align:center;
}

/* CARDS */
.card{
  width:90%;
  max-width:1100px;
  margin:40px auto;
  background:#111;
  padding:20px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(0.97);
  box-shadow:0 0 30px red;
}

.card img{
  width:100%;
  height:350px;
  object-fit:cover;
  border-radius:10px;
}

/* BUTTON */
button{
  background:red;
  border:none;
  padding:12px 25px;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

.backBtn{
  position:fixed;
  top:20px;
  right:20px;
  background:black;
  color:red;
  padding:10px 20px;
  border-radius:10px;
  border:1px solid red;
  cursor:pointer;
  display:none;
}
</style>
</head>

<body>

<div class="backBtn" onclick="goBack()">RETOUR</div>

<!-- FOND TEXTE -->
<div class="bg-text" id="bgText"></div>

<!-- ACCUEIL -->
<div class="hero" onclick="enterSite()" id="home">
<h1 class="neon">CLIQUEZ POUR ENTRER</h1>
<h2 class="neon">Juicy Service</h2>
</div>

<!-- PRODUITS -->
<div class="products" id="products">
<h2 class="neon">Nos Produits</h2>

<div class="card" onclick="openProduct('RL')">
<img src="https://cdn.cloudflare.steamstatic.com/steam/apps/252950/library_hero.jpg">
<h3>🚀 Boost Rocket League</h3>
</div>

<div class="card" onclick="openProduct('STEAM')">
<img src="https://cdn.cloudflare.steamstatic.com/store/home/store_home_share.jpg">
<h3>🎮 Compte Steam</h3>
</div>

</div>

<!-- PRODUIT -->
<div class="productPage" id="productPage">
<h1 id="productTitle" class="neon"></h1>
<h2>Prix : 20€</h2>
</div>

<script>

function setBackground(text){
let bg = document.getElementById("bgText");
bg.innerHTML = "";
bg.style.display = "block";

for(let i=0;i<5;i++){
let line = document.createElement("div");
line.className="line";
line.innerText = (text+" ").repeat(20);
bg.appendChild(line);
}
}

function enterSite(){
document.getElementById("home").style.display="none";
document.getElementById("products").style.display="block";
document.querySelector(".backBtn").style.display="block";

setBackground("NOS PRODUITS");
}

function openProduct(type){
document.getElementById("products").style.display="none";
document.getElementById("productPage").style.display="block";

if(type==="RL"){
document.getElementById("productTitle").innerText="Rocket League Boost";
setBackground("ROCKET LEAGUE BOOST");
}

if(type==="STEAM"){
document.getElementById("productTitle").innerText="Steam Account";
setBackground("STEAM ACCOUNT");
}
}

function goBack(){
document.getElementById("productPage").style.display="none";
document.getElementById("products").style.display="block";
setBackground("NOS PRODUITS");
}

</script>

</body>
</html>
