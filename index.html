<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juicy Service</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
  overflow:hidden;
}

/* 🔴 TEXTE NÉON */
.bg-text{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.line{
  position:absolute;
  width:300%;
  white-space:nowrap;
  font-size:50px;
  color:#ff1a1a;
  opacity:0.35;

  text-shadow:
    0 0 5px #ff0000,
    0 0 15px #ff0000,
    0 0 30px #ff0000,
    0 0 60px #ff0000,
    0 0 120px #ff0000,
    0 0 200px #ff0000;

  animation:scroll 25s linear infinite;
}

.line:nth-child(1){top:10%;}
.line:nth-child(2){top:30%;}
.line:nth-child(3){top:50%;}
.line:nth-child(4){top:70%;}
.line:nth-child(5){top:90%;}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* ACCUEIL */
.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2000') center/cover no-repeat;
  z-index:-2;
}

.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  cursor:pointer;
  position:relative;
}

.neon{
  color:red;
  text-shadow:0 0 20px red,0 0 50px red,0 0 100px red;
}

/* PAGES */
.products,.productPage{
  display:none;
  padding:50px;
  text-align:center;
  min-height:100vh;
}

/* CARDS */
.card{
  width:90%;
  max-width:1000px;
  margin:30px auto;
  background:#111;
  padding:20px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(0.97);
  box-shadow:0 0 40px red;
}

.card img{
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:10px;
}

/* PAGE PRODUIT */
.productLayout{
  display:flex;
  flex-wrap:wrap;
  gap:30px;
  justify-content:center;
}

.box{
  background:#111;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 25px red;
  flex:1;
  min-width:300px;
}

/* BUTTON */
button{
  background:red;
  border:none;
  padding:12px 25px;
  color:white;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  box-shadow:0 0 25px red;
}

input{
  width:60px;
  text-align:center;
  background:black;
  color:red;
  border:1px solid red;
}

/* RETOUR */
.backBtn{
  position:fixed;
  top:20px;
  right:20px;
  background:black;
  color:red;
  padding:10px 20px;
  border-radius:10px;
  border:1px solid red;
  cursor:pointer;
  display:none;
}
</style>
</head>

<body>

<div class="bg-text" id="bgText"></div>

<div class="backBtn" onclick="goBack()">RETOUR</div>

<!-- ACCUEIL -->
<div class="hero" onclick="enterSite()" id="home">
<h1 class="neon">CLIQUEZ POUR ENTRER</h1>
<h2 class="neon">Juicy Service</h2>
</div>

<!-- PRODUITS -->
<div class="products" id="products">
<h2 class="neon">Nos Produits</h2>

<div class="card" onclick="openProduct('RL')">
<img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?q=80&w=2000">
<h3>🚀 Rocket League Boost</h3>
</div>

<div class="card" onclick="openProduct('STEAM')">
<img src="https://cdn.cloudflare.steamstatic.com/store/home/store_home_share.jpg">
<h3>🎮 Steam Account</h3>
</div>
</div>

<!-- PAGE PRODUIT -->
<div class="productPage" id="productPage">

<h1 id="productTitle" class="neon"></h1>

<div class="productLayout">

<div class="box">
<h2>🔥 Service Premium</h2>
<p id="desc"></p>

<p>Quantité :</p>
<input type="number" value="1" id="qty">

<br><br>
<button onclick="accept()">Continuer</button>

<p style="color:#aaa;">
✔ Livraison instantanée<br>
✔ Support 24/7<br>
✔ Garantie qualité
</p>
</div>

<div class="box">
<h2>🧾 Résumé</h2>
<p id="resume"></p>
<p>Prix : 20€</p>

<div id="payment" style="display:none;">
<h3>💳 Paiement sécurisé</h3>

<form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
<input type="hidden" name="cmd" value="_xclick">
<input type="hidden" name="business" value="TON_EMAIL_PAYPAL">
<input type="hidden" name="item_name" id="paypalItem">
<input type="hidden" name="amount" value="20">

<button style="width:100%;font-size:18px;">
💸 Payer avec PayPal
</button>
</form>

<p style="color:#888;">
🔒 Paiement sécurisé SSL<br>
🛡 Protection acheteur
</p>

</div>

</div>

</div>

</div>

<script>

function setBackground(text){
let bg=document.getElementById("bgText");
bg.innerHTML="";
let full=(text+" 👑 ").repeat(25);

for(let i=0;i<5;i++){
let line=document.createElement("div");
line.className="line";
line.innerText=full;
bg.appendChild(line);
}
}

function enterSite(){
home.style.display="none";
products.style.display="block";
document.querySelector(".backBtn").style.display="block";
setBackground("NOS PRODUITS");
}

function openProduct(type){
products.style.display="none";
productPage.style.display="block";

let name="";
let desc="";
let bg="";
let img="";

if(type==="RL"){
name="Rocket League Boost";
desc="Boost ton rank rapidement avec nos experts.";
bg="RL BOOSTING";
img="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?q=80&w=2000";
}

if(type==="STEAM"){
name="Steam Account";
desc="Compte Steam premium sécurisé.";
bg="STEAM ACCOUNT";
img="https://cdn.cloudflare.steamstatic.com/store/home/store_home_share.jpg";
}

productTitle.innerText=name;
document.getElementById("desc").innerText=desc;
document.getElementById("resume").innerText=name;
document.getElementById("paypalItem").value=name;

/* 🎮 FOND DYNAMIQUE PROPRE */
document.querySelector(".productPage").style.background=
`linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)), url(${img}) center/cover no-repeat`;

setBackground(bg);
}

function goBack(){
productPage.style.display="none";
products.style.display="block";
setBackground("NOS PRODUITS");
}

function accept(){
document.getElementById("payment").style.display="block";
}

setBackground("JUICY SERVICE");

</script>

</body>
</html>
