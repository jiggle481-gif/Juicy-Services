<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juicy Service</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* ACCUEIL */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  cursor:pointer;
}

.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2000') center / cover no-repeat;
  z-index: -1;
}

.neon {
  color: red;
  text-shadow: 0 0 10px red, 0 0 20px red;
}

/* SCROLL */
.bg-scroll {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -2;
  display:none;
}

.scroll-line {
  position:absolute;
  width:200%;
  white-space:nowrap;
  color:red;
  opacity:0.3;
  font-size:24px;
  animation:scroll 35s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* PAGES */
.products, .productPage {
  display:none;
  padding:50px;
  text-align:center;
}

/* CARD */
.card{
  width:80%;
  max-width:900px;
  margin:20px auto;
  background:#111;
  padding:15px;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}

.card img{
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:10px;
}

/* BUTTON */
button{
  background:red;
  border:none;
  padding:12px 25px;
  color:white;
  cursor:pointer;
  margin-top:10px;
  border-radius:10px;
}

/* INPUT */
input{
  width:60px;
  text-align:center;
}

/* POPUP */
.popup{
  position:fixed;
  bottom:20px;
  left:20px;
  background:black;
  color:red;
  padding:10px;
  display:none;
}

/* RETOUR */
.backBtn{
  position:fixed;
  top:20px;
  right:20px;
  background:black;
  color:red;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
  display:none;
}
</style>
</head>

<body>

<div class="backBtn" onclick="goBack()">RETOUR</div>

<div class="bg-scroll" id="scrollBg">
<div class="scroll-line">Juicy Services Juicy Services Juicy Services</div>
</div>

<!-- ACCUEIL -->
<div class="hero" onclick="enterSite()" id="home">
<h1 class="neon">CLIQUEZ POUR ENTRER</h1>
<h2 class="neon">Juicy Service</h2>
</div>

<!-- PRODUITS -->
<div class="products" id="products">
<h2 class="neon">Nos Produits</h2>

<div class="card" onclick="openProduct('Boost RL')">
<img src="https://cdn.cloudflare.steamstatic.com/steam/apps/252950/library_hero.jpg">
<h3>Boosting RL</h3>
</div>

<div class="card" onclick="openProduct('Steam Account')">
<img src="https://cdn.cloudflare.steamstatic.com/store/home/store_home_share.jpg">
<h3>Steam Account</h3>
</div>

</div>

<!-- PAGE PRODUIT -->
<div class="productPage" id="productPage">

<h1 id="productTitle" class="neon"></h1>

<h2>Prix : 20€</h2>

<input type="number" value="1" id="qty">

<br>
<button onclick="addToCart()">Ajouter au panier</button>

<br><br>
<button onclick="accept()">Continuer paiement</button>

<div id="payment" style="display:none;">
<form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
<input type="hidden" name="cmd" value="_xclick">
<input type="hidden" name="business" value="TON_EMAIL_PAYPAL">
<input type="hidden" name="amount" value="20">
<button type="submit">Payer avec PayPal</button>
</form>
</div>

</div>

<div class="popup" id="popup"></div>

<script>
function enterSite(){
document.getElementById("home").style.display="none";
document.getElementById("products").style.display="block";
document.getElementById("scrollBg").style.display="block";
document.querySelector(".backBtn").style.display="block";
}

function openProduct(name){
document.getElementById("products").style.display="none";
document.getElementById("productPage").style.display="block";
document.getElementById("productTitle").innerText=name;
}

function goBack(){
document.getElementById("productPage").style.display="none";
document.getElementById("products").style.display="block";
}

function accept(){
document.getElementById("payment").style.display="block";
}

function addToCart(){
let qty=document.getElementById("qty").value;
alert("Ajouté x"+qty);
}
</script>

</body>
</html>
