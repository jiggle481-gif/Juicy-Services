<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Juicy Service • PREMIUM 2025-2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #000;
      --neon-red: #ff0044;
      --neon-blue: #00f0ff;
      --neon-purple: #9d00ff;
      --card-bg: #0a0a0f;
      --glow-red: 0 0 8px var(--neon-red), 0 0 16px var(--neon-red), 0 0 32px var(--neon-red), 0 0 60px var(--neon-red);
      --glow-blue: 0 0 8px var(--neon-blue), 0 0 16px var(--neon-blue), 0 0 32px var(--neon-blue), 0 0 70px var(--neon-blue);
      --glow-purple: 0 0 8px var(--neon-purple), 0 0 16px var(--neon-purple), 0 0 32px var(--neon-purple);
      --transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Orbitron', system-ui, sans-serif;
      background: var(--bg);
      color: white;
      min-height: 100dvh;
      overflow-x: hidden;
      cursor: none;
      position: relative;
    }
    body::after {
      content: '';
      position: fixed;
      width: 26px; height: 26px;
      background: transparent;
      border: 2px solid var(--neon-blue);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 99999;
      transition: width 0.15s, height 0.15s, background 0.2s;
      mix-blend-mode: difference;
      box-shadow: 0 0 15px var(--neon-blue);
      left: var(--x, 50vw);
      top: var(--y, 50vh);
    }
    body:hover::after {
      width: 42px; height: 42px;
      background: rgba(0, 240, 255, 0.18);
      box-shadow: 0 0 30px var(--neon-blue), 0 0 50px var(--neon-purple);
    }
    .bg-neon {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: 0.28;
    }
    .bg-neon span {
      position: absolute;
      left: 100%;
      white-space: nowrap;
      font-size: clamp(2rem, 7vw, 5.8rem);
      font-weight: 900;
      color: var(--neon-blue);
      text-shadow: 0 0 10px var(--neon-blue), 0 0 25px var(--neon-blue), 0 0 45px var(--neon-blue), 0 0 70px var(--neon-red), 0 0 100px var(--neon-purple);
      animation: scroll linear infinite;
      will-change: transform;
      filter: blur(0.5px);
    }
    .bg-neon span.purple { color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple), 0 0 25px var(--neon-purple), 0 0 45px var(--neon-purple), 0 0 80px var(--neon-red); }
    @keyframes scroll { to { transform: translateX(-200%); } }

    .hero {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 2;
      transition: opacity 1.4s cubic-bezier(0.23,1,0.32,1), transform 1.4s cubic-bezier(0.23,1,0.32,1);
    }
    .hero.hidden { opacity:0; transform:translateY(-60px); pointer-events:none; }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.65), rgba(0,15,30,0.85)),
                  url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&q=60&w=2400') center/cover no-repeat;
      z-index: -1;
      filter: brightness(0.55) contrast(1.3) saturate(1.4);
    }
    .hero-content h1 {
      font-size: clamp(4.2rem, 14vw, 11rem);
      font-weight: 900;
      text-shadow: var(--glow-red);
      letter-spacing: -4px;
      animation: neon-flicker 3s infinite alternate;
    }
    .hero-content h2 {
      font-size: clamp(2.8rem, 9vw, 6.5rem);
      font-weight: 700;
      color: var(--neon-blue);
      text-shadow: var(--glow-blue);
      margin-top: -15px;
    }
    @keyframes neon-flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.92; } }

    .enter-btn {
      margin-top: 3rem;
      padding: 1.3rem 4rem;
      font-size: 1.65rem;
      font-weight: 900;
      letter-spacing: 2px;
      color: #000;
      background: linear-gradient(90deg, var(--neon-red), var(--neon-blue));
      border: none;
      border-radius: 999px;
      box-shadow: 0 0 50px rgba(0,240,255,0.7), 0 0 90px rgba(255,0,68,0.5);
      cursor: pointer;
      transition: var(--transition);
    }
    .enter-btn:hover {
      transform: scale(1.12) translateY(-8px);
      box-shadow: 0 0 90px rgba(0,240,255,0.95), 0 0 140px rgba(255,0,68,0.8);
    }

    main {
      padding: 6rem 1.5rem 10rem;
      max-width: 1480px;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(60px);
      transition: all 1.3s cubic-bezier(0.23,1,0.32,1);
      position: relative;
      z-index: 2;
    }
    main.visible { opacity:1; transform:none; }

    .section-title {
      font-size: clamp(3rem, 9vw, 6.2rem);
      text-align: center;
      margin-bottom: 5rem;
      text-shadow: var(--glow-blue);
      color: var(--neon-blue);
      letter-spacing: -2px;
    }

    .grid {
      display: grid;
      gap: 2rem;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    }
    .card {
      background: var(--card-bg);
      border-radius: 1.4rem;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(0,240,255,0.15);
      transition: var(--transition);
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-18px) scale(1.03);
      box-shadow: 0 25px 70px rgba(0,240,255,0.35), 0 0 0 3px var(--neon-blue);
    }

  <script>
    document.addEventListener('mousemove', e => {
      document.body.style.setProperty('--x', e.clientX + 'px');
      document.body.style.setProperty('--y', e.clientY + 'px');
    });

    function enterSite() {
      document.getElementById('hero').classList.add('hidden');
      setTimeout(() => {
        document.getElementById('hero').style.display = 'none';
        document.getElementById('main').classList.add('visible');
      }, 900);
    }

    function showPayment(type) {
      document.getElementById('main').style.display = 'none';
      document.getElementById(`payment-${type}`).style.display = 'block';
      window.scrollTo(0,0);
      resetQty(type);
    }

    function backToMain() {
      document.querySelectorAll('.payment-page').forEach(p => p.style.display = 'none');
      document.getElementById('main').style.display = 'block';
    }

    let qty = { hwid:1, boost:1, steam:1 };
    const basePrice = { hwid:30, boost:20, steam:20 };

    function resetQty(type) {
      qty[type] = 1;
      updateTotal(type);
    }

    function changeQty(type, delta) {
      qty[type] = Math.max(1, Math.min(5, qty[type] + delta));
      updateTotal(type);
    }

    function updateTotal(type) {
      const totalEl = document.getElementById(`total-${type}`);
      const qtyEl = document.getElementById(`qty-val-${type}`);
      let total = basePrice[type] * qty[type];
      if (qty[type] >= 2) total = Math.floor(total * 0.9);
      totalEl.textContent = total + '€';
      qtyEl.textContent = qty[type];
    }

    function payWithPaypal(type) {
      let amount = basePrice[type] * qty[type];
      if (qty[type] >= 2) amount = Math.floor(amount * 0.9);
      // Remplace VOTREPSEUDO par ton vrai pseudo PayPal.me
      const paypalLink = `https://www.paypal.me/VOTREPSEUDO/${amount}.00`;
      window.location.href = paypalLink;
    }

    function toggleFAQ(header) {
      const content = header.nextElementSibling;
      const isOpen = content.style.maxHeight;
      document.querySelectorAll('.faq-content').forEach(c => c.style.maxHeight = null);
      if (!isOpen) content.style.maxHeight = content.scrollHeight + "px";
    }

    window.onload = () => {
      setInterval(() => {
        document.querySelectorAll('.section-title').forEach(t => {
          t.style.textShadow = Math.random() > 0.5 ? 'var(--glow-blue)' : 'var(--glow-purple)';
        });
      }, 1800);
    };
  </script>
</body>
</html>
