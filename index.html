<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #000;
      --neon-red: #ff0044;
      --neon-blue: #00f0ff;
      --neon-purple: #9d00ff;
      --card-bg: #0a0a0f;
      --glow-red: 0 0 8px var(--neon-red), 0 0 16px var(--neon-red), 0 0 32px var(--neon-red), 0 0 60px var(--neon-red);
      --glow-blue: 0 0 8px var(--neon-blue), 0 0 16px var(--neon-blue), 0 0 32px var(--neon-blue), 0 0 70px var(--neon-blue);
      --glow-purple: 0 0 8px var(--neon-purple), 0 0 16px var(--neon-purple), 0 0 32px var(--neon-purple);
      --transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Orbitron', system-ui, sans-serif;
      background: var(--bg);
      color: white;
      min-height: 100dvh;
      overflow-x: hidden;
      cursor: none;
      position: relative;
    }
    body::after {
      content: '';
      position: fixed;
      width: 26px; height: 26px;
      background: transparent;
      border: 2px solid var(--neon-blue);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 99999;
      transition: width 0.15s, height 0.15s, background 0.2s;
      mix-blend-mode: difference;
      box-shadow: 0 0 15px var(--neon-blue);
      left: var(--x, 50vw);
      top: var(--y, 50vh);
    }
    body:hover::after {
      width: 42px; height: 42px;
      background: rgba(0, 240, 255, 0.18);
      box-shadow: 0 0 30px var(--neon-blue), 0 0 50px var(--neon-purple);
    }
    .bg-neon {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: 0.28;
    }
    .bg-neon span {
      position: absolute;
      left: 100%;
      white-space: nowrap;
      font-size: clamp(2rem, 7vw, 5.8rem);
      font-weight: 900;
      color: var(--neon-blue);
      text-shadow: 0 0 10px var(--neon-blue), 0 0 25px var(--neon-blue), 0 0 45px var(--neon-blue), 0 0 70px var(--neon-red), 0 0 100px var(--neon-purple);
      animation: scroll linear infinite;
      will-change: transform;
      filter: blur(0.5px);
    }
    .bg-neon span.purple { color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple), 0 0 25px var(--neon-purple), 0 0 45px var(--neon-purple), 0 0 80px var(--neon-red); }
    @keyframes scroll { to { transform: translateX(-200%); } }

    .hero {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 2;
      transition: opacity 1.4s cubic-bezier(0.23,1,0.32,1), transform 1.4s cubic-bezier(0.23,1,0.32,1);
    }
    .hero.hidden { opacity:0; transform:translateY(-60px); pointer-events:none; }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.65), rgba(0,15,30,0.85)),
                  url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&q=60&w=2400') center/cover no-repeat;
      z-index: -1;
      filter: brightness(0.55) contrast(1.3) saturate(1.4);
    }
    .hero-content h1 {
      font-size: clamp(4.2rem, 14vw, 11rem);
      font-weight: 900;
      text-shadow: var(--glow-red);
      letter-spacing: -4px;
      animation: neon-flicker 3s infinite alternate;
    }
    .hero-content h2 {
      font-size: clamp(2.8rem, 9vw, 6.5rem);
      font-weight: 700;
      color: var(--neon-blue);
      text-shadow: var(--glow-blue);
      margin-top: -15px;
    }
    @keyframes neon-flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.92; } }

    .enter-btn {
      margin-top: 3rem;
      padding: 1.3rem 4rem;
      font-size: 1.65rem;
      font-weight: 900;
      letter-spacing: 2px;
      color: #000;
      background: linear-gradient(90deg, var(--neon-red), var(--neon-blue));
      border: none;
      border-radius: 999px;
      box-shadow: 0 0 50px rgba(0,240,255,0.7), 0 0 90px rgba(255,0,68,0.5);
      cursor: pointer;
      transition: var(--transition);
    }
    .enter-btn:hover {
      transform: scale(1.12) translateY(-8px);
      box-shadow: 0 0 90px rgba(0,240,255,0.95), 0 0 140px rgba(255,0,68,0.8);
    }

    main {
      padding: 6rem 1.5rem 10rem;
      max-width: 1480px;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(60px);
      transition: all 1.3s cubic-bezier(0.23,1,0.32,1);
      position: relative;
      z-index: 2;
    }
    main.visible { opacity:1; transform:none; }

    .section-title {
      font-size: clamp(3rem, 9vw, 6.2rem);
      text-align: center;
      margin-bottom: 5rem;
      text-shadow: var(--glow-blue);
      color: var(--neon-blue);
      letter-spacing: -2px;
    }

    .grid {
      display: grid;
      gap: 2rem;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    }
    .card {
      background: var(--card-bg);
      border-radius: 1.4rem;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(0,240,255,0.15);
      transition: var(--transition);
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-18px) scale(1.03);
      box-shadow: 0 25px 70px rgba(0,240,255,0.35), 0 0 0 3px var(--neon-blue);
    }
    .card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
    }
    .card-content {
      padding: 1.4rem 1.2rem;
      text-align: center;
    }
    .card h3 {
      font-size: clamp(1.55rem, 4vw, 2.1rem);
      color: var(--neon-blue);
      text-shadow: var(--glow-blue);
      margin-bottom: 0.5rem;
    }
    .price-tag {
      font-size: 2rem;
      font-weight: 900;
      color: white;
      text-shadow: 0 0 20px var(--neon-red);
    }

    .faq {
      margin-top: 8rem;
    }
    .faq-item {
      margin: 1.5rem 0;
      background: rgba(10,10,15,0.65);
      border-radius: 1.2rem;
      border: 1px solid rgba(0,240,255,0.2);
      overflow: hidden;
    }
    .faq-header {
      padding: 1.4rem 1.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-size: 1.35rem;
      color: var(--neon-blue);
    }
    .faq-content {
      padding: 0 1.8rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }

    .payment-page {
      display: none;
      min-height: 100dvh;
      padding: 6rem 1.5rem 5rem;
      background: var(--bg);
      z-index: 10;
    }
    .payment-container {
      max-width: 620px;
      margin: 0 auto;
      background: #0d0d14;
      border-radius: 1.8rem;
      padding: 3rem 2.5rem;
      border: 1px solid rgba(0,240,255,0.25);
      box-shadow: 0 0 80px rgba(0,240,255,0.2);
    }
    .back-btn {
      color: var(--neon-blue);
      font-size: 1.25rem;
      text-decoration: none;
      margin-bottom: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .payment-title {
      font-size: 2.8rem;
      text-align: center;
      color: var(--neon-red);
      text-shadow: var(--glow-red);
    }
    .total-price {
      font-size: 4rem;
      text-align: center;
      color: white;
      margin: 1.5rem 0;
      text-shadow: 0 0 30px var(--neon-blue);
    }
    .qty-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0;
    }
    .qty-btn {
      background: #111;
      color: white;
      border: 2px solid var(--neon-blue);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      font-size: 1.6rem;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: var(--transition);
    }
    .qty-btn:hover { background: var(--neon-blue); color: black; }
    .qty-value {
      font-size: 2rem;
      font-weight: 700;
      min-width: 60px;
      text-align: center;
    }
    .pay-box {
      background: rgba(15,15,25,0.7);
      border: 1px solid rgba(0,240,255,0.3);
      border-radius: 1.2rem;
      padding: 2rem;
      margin: 2rem 0;
      text-align: center;
    }
    .btn-pay {
      width: 100%;
      padding: 1.5rem;
      font-size: 1.5rem;
      font-weight: 900;
      color: black;
      background: linear-gradient(90deg, #00ff9d, #00f0ff);
      border: none;
      border-radius: 999px;
      box-shadow: 0 0 45px rgba(0,255,157,0.6);
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-pay:hover {
      transform: scale(1.06);
      box-shadow: 0 0 80px rgba(0,255,157,0.9);
    }

    @media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; } }
  </style>
</head>
